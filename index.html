<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     PenguineDavid — Matrix WSL Portfolio
     A single-file terminal-aesthetic portfolio site.

     Structure:
       1. CSS — custom properties, layout, component styles
       2. HTML — topbar, terminal output area, input row
       3. JS sections:
            a) localStorage cache helpers  (TTL-based, 1 hour)
            b) Canvas matrix rain + donut  (background animation)
            c) Margin popups               (hacker-aesthetic overlays)
            d) GitHub API layer            (profile / repos / languages)
            e) Terminal output helpers     (append, bar, etc.)
            f) Command definitions         (help, whoami, skills, …)
            g) Input handler               (keydown, history, tab)
            h) Clock + traffic lights
            i) Boot sequence
     GitHub Pages will serve it at https://PenguineDavid.github.io
     ============================================================ -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix WSL — PenguineDavid</title>

    <!-- Share Tech Mono  : terminal body text
         VT323            : topbar title / clock (old-school CRT feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

    <style>

        /* ── Reset ─────────────────────────────────────────────── */

        * {
            margin:  0;
            padding: 0;
            box-sizing: border-box;
        }


        /* ── Design tokens ─────────────────────────────────────── */

        :root {
            /* greens — primary palette */
            --green:       #00ff41;   /* bright matrix green, used for active text */
            --green-dim:   #00aa2a;   /* mid green, scrollbar / output text        */
            --green-faint: #003d10;   /* very dark green, progress bar empty cells */

            /* blues — accent / prompt path */
            --blue:        #4fc3f7;   /* prompt path, accent text                  */
            --blue-dim:    #0288d1;   /* reserved                                  */

            /* other */
            --cyan:        #00fff5;   /* borders, highlights                       */
            --white:       #dcdcdc;   /* prompt symbols, typed commands            */
            --bg:          #000000;   /* page background                           */

            /* macOS-style traffic light dots */
            --red-dot:    #ff5f57;
            --yellow-dot: #ffbd2e;
            --green-dot:  #27c93f;
        }


        /* ── Base ──────────────────────────────────────────────── */

        html,
        body {
            width:       100%;
            height:      100%;
            background:  var(--bg);
            overflow:    hidden;
            font-family: 'Share Tech Mono', monospace;
            color:       var(--green);
            cursor:      text;
        }


        /* ── Canvas (behind everything) ────────────────────────── */

        #bg-canvas {
            position: fixed;
            inset:    0;
            width:    100%;
            height:   100%;
            z-index:  0;
        }


        /* ── CRT scanline overlay ───────────────────────────────── */
        /* Thin alternating transparent/dark bands to mimic CRT phosphor rows */

        #crt {
            position:       fixed;
            inset:          0;
            pointer-events: none;
            z-index:        50;
            background:     repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.18) 2px,
                rgba(0, 0, 0, 0.18) 4px
            );
        }


        /* ── CRT vignette ───────────────────────────────────────── */
        /* Darkens the corners/edges like an old monitor */

        #vignette {
            position:       fixed;
            inset:          0;
            pointer-events: none;
            z-index:        51;
            background:     radial-gradient(
                ellipse at center,
                transparent 55%,
                rgba(0, 0, 0, 0.75) 100%
            );
        }


        /* ── Screen flicker ─────────────────────────────────────── */
        /* Subtle periodic opacity dip to mimic CRT instability */

        @keyframes flicker {
            0%,  100% { opacity: 1.00; }
            91%        { opacity: 1.00; }
            92%        { opacity: 0.35; }
            93%        { opacity: 1.00; }
            95%        { opacity: 0.75; }
            96%        { opacity: 1.00; }
        }

        #app {
            position:        fixed;
            inset:           0;
            display:         flex;
            flex-direction:  column;
            z-index:         10;
            animation:       flicker 9s infinite;
        }


        /* ── Top bar ────────────────────────────────────────────── */

        #topbar {
            height:          28px;
            background:      rgba(45, 45, 45, 0.92);
            display:         flex;
            align-items:     center;
            padding:         0 10px;
            gap:             7px;
            flex-shrink:     0;
            border-bottom:   1px solid #1a1a1a;
            user-select:     none;
            cursor:          default;
        }

        /* Traffic light dots */
        .dot {
            width:         12px;
            height:        12px;
            border-radius: 50%;
            cursor:        pointer;
            transition:    filter 0.1s;
            flex-shrink:   0;
        }

        .dot:hover {
            filter: brightness(1.4);
        }

        #dot-red    { background: var(--red-dot);    }
        #dot-yellow { background: var(--yellow-dot); }
        #dot-green  { background: var(--green-dot);  }

        /* Centered title text */
        #topbar-title {
            flex:           1;
            text-align:     center;
            font-family:    'VT323', monospace;
            font-size:      15px;
            color:          var(--white);
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        /* Live UTC clock on the right */
        #topbar-clock {
            font-family: 'VT323', monospace;
            font-size:   13px;
            color:       #888888;
            flex-shrink: 0;
        }


        /* ── Terminal area ──────────────────────────────────────── */

        #terminal {
            flex:           1;
            display:        flex;
            flex-direction: column;
            padding:        10px 18px 8px;
            overflow:       hidden;
        }

        /* Scrollable output pane — takes all remaining height */
        #output {
            flex:            1;
            overflow-y:      auto;
            scrollbar-width: thin;
            scrollbar-color: var(--green-dim) transparent;
            font-size:       14px;
            line-height:     1.55;
        }

        #output::-webkit-scrollbar       { width:      3px;             }
        #output::-webkit-scrollbar-thumb { background: var(--green-dim); }


        /* ── Output line styles ─────────────────────────────────── */

        /* Base: preserve whitespace exactly as written */
        .line {
            white-space: pre-wrap;
            word-break:  break-word;
        }

        /* .t: text glow + dark halo so text stays legible over the rain */
        .t {
            text-shadow:
                0 0 8px currentColor,
                0 0 2px rgba(0, 0, 0, 0.9);
        }


        /* ── Colour utility classes ─────────────────────────────── */

        .c-user  { color: #00ff41;           }   /* prompt: user@        */
        .c-host  { color: #00ff41;           }   /* prompt: host         */
        .c-path  { color: var(--blue);       }   /* prompt: ~/path       */
        .c-out   { color: var(--green-dim);  }   /* normal output text   */
        .c-hi    { color: var(--cyan);       }   /* borders, highlights  */
        .c-acc   { color: var(--blue);       }   /* accents              */
        .c-dim   { color: #1a5c2a;           }   /* dim / metadata       */
        .c-err   { color: #ff4444;           }   /* errors               */
        .c-ok    { color: var(--green);      }   /* success / bright     */
        .c-white { color: var(--white);      }   /* prompt symbols       */

        /* Outer glow — used on ASCII PD and repo names */
        .glow {
            text-shadow:
                0 0 10px currentColor,
                0 0 25px currentColor;
        }


        /* ── Input row ──────────────────────────────────────────── */

        #input-row {
            display:     flex;
            align-items: center;
            gap:         0;
            margin-top:  6px;
            padding-top: 6px;
            border-top:  1px solid #0a2e10;
            flex-shrink: 0;
            font-size:   14px;
        }

        #input-prompt {
            white-space: nowrap;
        }

        /* The actual <input> — styled to be invisible, just a text receiver */
        #cmd-input {
            background:  transparent;
            border:      none;
            outline:     none;
            color:       var(--white);
            font-family: 'Share Tech Mono', monospace;
            font-size:   14px;
            flex:        1;
            caret-color: var(--green);
            text-shadow: 0 0 6px var(--green);
        }

        /* Blinking block cursor sits next to the input */
        @keyframes blink {
            50% { opacity: 0; }
        }

        #cursor {
            display:        inline-block;
            width:          8px;
            height:         1em;
            background:     var(--green);
            vertical-align: text-bottom;
            animation:      blink 1s step-end infinite;
            box-shadow:     0 0 6px var(--green);
        }


        /* ── Margin popups ──────────────────────────────────────── */
        /* Fixed-position overlays that flicker in/out on keypress  */

        .popup {
            position:       fixed;
            font-family:    'Share Tech Mono', monospace;
            font-size:      12px;
            line-height:    1.4;
            padding:        4px 6px;
            background:     rgba(0, 0, 0, 0.6);
            border:         1px solid;
            pointer-events: none;
            z-index:        30;
            white-space:    pre;
            text-shadow:    0 0 5px currentColor;
        }

    </style>
</head>

<body>

    <!-- Canvas sits behind everything — matrix rain + donut drawn here -->
    <canvas id="bg-canvas"></canvas>

    <!-- CRT effects stacked over the canvas -->
    <div id="crt"></div>
    <div id="vignette"></div>

    <!-- Main app shell — topbar + terminal -->
    <div id="app">

        <div id="topbar">
            <div class="dot" id="dot-red"   ></div>
            <div class="dot" id="dot-yellow"></div>
            <div class="dot" id="dot-green" ></div>
            <div id="topbar-title">
                Matrix WSL — PenguineDavid@portfolio:~ &copy; 2026 PenguineDavid. All Rights Reserved.
            </div>
            <div id="topbar-clock"></div>
        </div>

        <div id="terminal">
            <div id="output"></div>

            <div id="input-row">
                <!--
                    Classic bash prompt layout:
                        user@host  — bright green
                        :          — white
                        ~/path     — blue
                        $          — white
                -->
                <span id="input-prompt">
                    <span class="c-user">PenguineDavid</span><span class="c-white">@</span><span
                    class="c-host">portfolio</span><span class="c-white">:</span><span
                    class="c-path">~</span><span class="c-white">$&nbsp;</span>
                </span>
                <input id="cmd-input" type="text" autocomplete="off" spellcheck="false">
                <span id="cursor"></span>
            </div>
        </div>

    </div><!-- /#app -->


    <script>
        'use strict';

        // ============================================================
        //  a) localStorage CACHE
        //
        //  All GitHub API responses are persisted to localStorage with
        //  a timestamp so page refreshes don't burn the unauthenticated
        //  rate limit (60 req/hr per IP).
        //
        //  Storage format per key:
        //      { data: <payload>, ts: <epoch-ms> }
        //
        //  TTL: 1 hour. Stale entries are evicted on read.
        //  Keys are defined in LS_KEYS below.
        // ============================================================

        const CACHE_TTL_MS = 60 * 60 * 1000;   // 1 hour in milliseconds

        const LS_KEYS = {
            profile:   'ghc_profile',
            repos:     'ghc_repos',
            languages: 'ghc_languages',
        };


        /**
         * Read a value from localStorage.
         * Returns the stored data if present and not stale, otherwise null.
         * Automatically removes the key if it has expired.
         */
        function lsGet(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;

                const { data, ts } = JSON.parse(raw);
                const age = Date.now() - ts;

                if (age > CACHE_TTL_MS) {
                    // Stale — evict immediately so next read triggers a fresh fetch
                    localStorage.removeItem(key);
                    return null;
                }

                return data;
            } catch {
                // Malformed entry or storage unavailable
                return null;
            }
        }


        /**
         * Write a value to localStorage with the current timestamp.
         * Fails silently if storage is full or unavailable.
         */
        function lsSet(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify({ data, ts: Date.now() }));
            } catch {
                // Storage quota exceeded or private browsing — silently ignore
            }
        }


        /**
         * Returns a human-readable age string for a cached key,
         * e.g. "4m ago" or "23s ago". Returns null if key is not cached.
         */
        function lsAge(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;

                const { ts }       = JSON.parse(raw);
                const ageSeconds   = Math.floor((Date.now() - ts) / 1000);

                if (ageSeconds < 60)   return `${ageSeconds}s ago`;
                if (ageSeconds < 3600) return `${Math.floor(ageSeconds / 60)}m ago`;

                return `${Math.floor(ageSeconds / 3600)}h ago`;
            } catch {
                return null;
            }
        }


        /**
         * Wipe all cache keys from localStorage.
         * The caller is responsible for also resetting memCache.
         */
        function lsClear() {
            Object.values(LS_KEYS).forEach(key => localStorage.removeItem(key));
        }


        // ============================================================
        //  b) MATRIX RAIN + DONUT  (Canvas background)
        //
        //  Two layers drawn onto a single <canvas>:
        //    1. Matrix rain — columns of falling binary/corrupt glyphs
        //    2. Spinning ASCII donut — the classic donut.c animation
        //       mapped to the canvas coordinate space
        //
        //  Burst mode: triggered on keypress, speeds rain up and causes
        //              static column effects and colour flares.
        //  Idle mode:  after 120 idle frames, slows rain to 30% speed.
        // ============================================================

        const canvas = document.getElementById('bg-canvas');
        const ctx    = canvas.getContext('2d');

        // Character sets used in the rain
        const CORRUPT_CHARS = '!@#$%^&*()_+-=[]{};:<>?/\\|~`\'"';
        const GLYPHS        = ('01'.repeat(6) + CORRUPT_CHARS).split('');

        // Colours applied to the rain head and static-burst columns during burst mode
        const FLARE_COLORS = ['#00ff41', '#ffffff', '#ff4444', '#00fff5', '#ffff00'];

        // Canvas layout — recalculated on resize
        let cols  = 0;
        let rows  = 0;
        let cellW = 0;
        let cellH = 14;   // px — must match the ctx.font size below
        let drops = [];   // one drop object per column

        // Animation state counters
        let burstFrames = 0;   // counts down after a keypress
        let idleFrames  = 0;   // counts up while no keypresses occur

        const BURST_DURATION  = 80;
        const IDLE_THRESHOLD  = 120;

        const isBurst = () => burstFrames > 0;
        const isIdle  = () => idleFrames > IDLE_THRESHOLD;

        // Donut rotation state
        let donutA     = 0.0;
        let donutB     = 0.0;
        let donutCache = [];   // normalised {nx, ny, ch} positions from last computeDonut()


        /**
         * Recalculates canvas dimensions and rebuilds the drops array.
         * Called on load and on every window resize.
         */
        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;

            // Fit as many ~10px-wide columns as possible
            cellW = Math.ceil(canvas.width / Math.floor(canvas.width / 10));
            cols  = Math.floor(canvas.width  / cellW);
            rows  = Math.floor(canvas.height / cellH);

            // Rebuild drop state — each column gets its own independent drop
            drops = [];
            for (let x = 0; x < cols; x++) {
                drops.push({
                    y:           Math.random() * rows - rows,   // start above viewport
                    speed:       0.1 + Math.random() * 0.4,
                    length:      5 + Math.floor(Math.random() * 10),
                    glitch:      false,
                    active:      true,
                    staticBurst: false,
                    staticTimer: 0,
                });
            }
        }


        /**
         * Runs one frame of the donut.c algorithm and populates donutCache
         * with the visible character positions in normalised (0..1) space.
         * Advances rotation angles A and B for the next frame.
         *
         * Original algorithm: https://www.a1k0n.net/2011/07/20/donut-math.html
         */
        function computeDonut() {
            const DONUT_COLS = 80;
            const DONUT_ROWS = 24;
            const CELL_COUNT = DONUT_COLS * DONUT_ROWS;

            const out = new Array(CELL_COUNT).fill(' ');
            const z   = new Float32Array(CELL_COUNT);   // depth buffer

            for (let j = 0; j < 6.28; j += 0.07) {
                for (let i = 0; i < 6.28; i += 0.02) {
                    const c = Math.sin(i);
                    const d = Math.cos(j);
                    const e = Math.sin(donutA);
                    const f = Math.sin(j);
                    const g = Math.cos(donutA);
                    const h = d + 2;
                    const D = 1 / (c * h * e + f * g + 5);   // 1/z (inverse depth)
                    const l = Math.cos(i);
                    const m = Math.cos(donutB);
                    const n = Math.sin(donutB);
                    const t = c * h * g - f * e;

                    const xi = Math.round(40 + 30 * D * (l * h * m - t * n));
                    const yi = Math.round(12 + 15 * D * (l * h * n + t * m));

                    if (yi >= 0 && yi < DONUT_ROWS && xi >= 0 && xi < DONUT_COLS) {
                        const o = xi + DONUT_COLS * yi;
                        const N = Math.floor(
                            8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n)
                        );

                        // Only write if this point is in front of what's already there
                        if (D > z[o]) {
                            z[o]   = D;
                            out[o] = '.,-~:;=!*#$@'[N > 0 ? N % 12 : 0];
                        }
                    }
                }
            }

            // Convert flat character grid to normalised canvas coordinates
            donutCache = [];
            for (let k = 0; k < CELL_COUNT; k++) {
                if (out[k] !== ' ') {
                    donutCache.push({
                        nx: (k % DONUT_COLS) / (DONUT_COLS - 1),
                        ny: Math.floor(k / DONUT_COLS) / (DONUT_ROWS - 1),
                        ch: out[k],
                    });
                }
            }

            // Advance rotation for next frame
            donutA += 0.04;
            donutB += 0.02;
        }


        /**
         * Main animation loop — runs at display refresh rate via rAF.
         * Draws rain columns first, then the donut on top.
         */
        function drawFrame() {

            // Semi-transparent black fill over the previous frame produces the
            // characteristic "fading tail" of matrix rain
            ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const speedMultiplier = isBurst() ? 3.5 : isIdle() ? 0.3 : 1.0;
            ctx.font = `${cellH}px 'Share Tech Mono', monospace`;

            // ── Rain columns ─────────────────────────────────────
            for (let x = 0; x < cols; x++) {
                const drop = drops[x];

                // Static burst: column shows rapid random corrupt chars
                if (drop.staticBurst) {
                    drop.staticTimer--;

                    if (drop.staticTimer <= 0) {
                        drop.staticBurst = false;
                    } else {
                        for (let y = 0; y < rows; y++) {
                            ctx.fillStyle = FLARE_COLORS[Math.floor(Math.random() * 3)];
                            ctx.fillText(
                                CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)],
                                x * cellW,
                                y * cellH
                            );
                        }
                        continue;
                    }
                }

                // Small chance to trigger a static burst during burst mode
                if (isBurst() && burstFrames > 70 && Math.random() < 0.0025) {
                    drop.staticBurst = true;
                    drop.staticTimer = 3 + Math.floor(Math.random() * 5);
                    continue;
                }

                // Inactive drops: small chance to reactivate each frame
                if (!drop.active) {
                    const activateChance = isBurst() ? 25 : isIdle() ? 1 : 5;
                    if (Math.random() * 100 < activateChance) {
                        drop.active  = true;
                        drop.y       = Math.random() * 10 - 20;
                        drop.speed   = 0.1 + Math.random() * 0.4;
                        drop.length  = 5 + Math.floor(Math.random() * 10);
                    }
                    continue;
                }

                // Randomly toggle glitch state
                if (Math.random() * 100 < (isBurst() ? 15 : 3)) drop.glitch = true;
                if (Math.random() * 100 < (isBurst() ? 2  : 1)) drop.glitch = false;

                // Draw the tail — tr=0 is the head, larger values are older/dimmer
                const tailLength = drop.length + (isBurst() ? 8 : 0);
                const headRow    = Math.floor(drop.y);

                for (let tr = 0; tr < tailLength; tr++) {
                    const targetRow = headRow - tr;
                    if (targetRow < 0 || targetRow >= rows) continue;

                    let glyph;
                    let color;

                    if (tr === 0) {
                        // Head: bright, random glyph, flare colour during burst
                        glyph = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
                        color = isBurst()
                            ? FLARE_COLORS[Math.floor(Math.random() * FLARE_COLORS.length)]
                            : '#aaffaa';

                    } else if (tr < 4) {
                        // Near-head: medium brightness, may glitch to corrupt chars
                        glyph = drop.glitch
                            ? CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
                            : (Math.random() < 0.5 ? '0' : '1');
                        color = isBurst()
                            ? FLARE_COLORS[Math.floor(Math.random() * FLARE_COLORS.length)]
                            : (Math.random() < 0.5 ? '#00ff41' : '#00cc33');

                    } else if (tr < 8) {
                        // Mid-tail: standard green, still may glitch
                        glyph = drop.glitch
                            ? CORRUPT_CHARS[Math.floor(Math.random() * CORRUPT_CHARS.length)]
                            : (Math.random() < 0.5 ? '0' : '1');
                        color = '#009922';

                    } else {
                        // Far tail: dim, binary only
                        glyph = Math.random() < 0.5 ? '0' : '1';
                        color = '#006611';
                    }

                    ctx.fillStyle = color;
                    ctx.fillText(glyph, x * cellW, (targetRow + 1) * cellH);
                }

                // Advance drop downward
                drop.y += drop.speed * speedMultiplier;

                // Deactivate once the entire tail has scrolled past the bottom
                if (drop.y - drop.length > rows) {
                    drop.active = false;
                }
            }

            // ── Donut overlay ─────────────────────────────────────
            // shadowBlur must be explicitly 0 here — if burst-mode glow leaks
            // in from the rain section, every donut character goes blurry.
            computeDonut();
            ctx.shadowBlur  = 0;
            ctx.shadowColor = 'transparent';
            ctx.fillStyle   = isBurst() ? '#00fff5' : '#00cc33';

            for (const point of donutCache) {
                ctx.fillText(
                    point.ch,
                    point.nx * canvas.width,
                    point.ny * canvas.height
                );
            }

            // Tick animation state
            if (burstFrames > 0) {
                burstFrames--;
            } else {
                idleFrames++;
            }

            requestAnimationFrame(drawFrame);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawFrame();


        // ============================================================
        //  c) MARGIN POPUPS
        //
        //  Small hacker-flavoured panels that spawn on the left or
        //  right margin whenever the user runs a command.
        //  They flicker in their final 500ms then remove themselves.
        // ============================================================

        const POPUP_TEMPLATES = [
            { lines: ['[ ACCESS GRANTED ]', 'USER: root',          'LEVEL: 7 CLEARANCE'], color: '#00ff41' },
            { lines: ['[ DECRYPTING... ]',  'KEY: 0x4F3A91C2',     'STATUS: OK'        ], color: '#00fff5' },
            { lines: ['[ INTRUSION DET ]',  'SRC: 10.0.0.1',       'TRACING...'        ], color: '#4fc3f7' },
            { lines: ['[ SYSTEM ALERT ]',   'PROC: 0xDEADBEEF',    'KILL? [Y/N]'       ], color: '#ff4444' },
            { lines: ['[ DOWNLOADING ]',    'FILES: 1337',          'RATE: 9.6 Mb/s'    ], color: '#00ff41' },
            { lines: ['[ BYPASS ACTIVE ]',  'PORT: 22/SSH',         'TUNNELED: YES'     ], color: '#00fff5' },
            { lines: ['[ NULL PTR FAULT ]', 'ADDR: 0x00000000',    'CORE DUMPED'       ], color: '#ff4444' },
            { lines: ['[ GITHUB UPLINK ]',  'REPO: PenguineDavid', 'SYNC: OK'          ], color: '#00ff41' },
            { lines: ['[ HASH COLLIDE ]',   'MD5: BROKEN',          'EXPLOITING...'     ], color: '#4fc3f7' },
            { lines: ['[ CONPTY INIT ]',    'COLS: 80 ROWS: 24',   'STATUS: READY'     ], color: '#00fff5' },

        /**
         * Creates a popup element, places it randomly on left or right margin,
         * and sets it up to flicker out after a randomised duration.
         */
        function spawnPopup() {
            const template = POPUP_TEMPLATES[Math.floor(Math.random() * POPUP_TEMPLATES.length)];

            const el             = document.createElement('div');
            el.className         = 'popup';
            el.style.color       = template.color;
            el.style.borderColor = template.color;
            el.style.boxShadow   = `0 0 8px ${template.color}55`;
            el.textContent       = template.lines.join('\n');

            // Randomly place on left or right edge
            const side   = Math.random() < 0.5 ? 'left' : 'right';
            el.style[side] = '4px';
            el.style.top   = (40 + Math.random() * (window.innerHeight - 120)) + 'px';

            document.body.appendChild(el);

            // Flicker and self-remove after `duration` milliseconds
            const duration = 2000 + Math.random() * 2000;
            let elapsed    = 0;

            const flickerInterval = setInterval(() => {
                elapsed += 80;

                // Start flickering in the last 500ms before removal
                if (elapsed > duration - 500) {
                    el.style.opacity = Math.random() > 0.4 ? '1' : '0.2';
                }

                if (elapsed > duration) {
                    clearInterval(flickerInterval);
                    el.remove();
                }
            }, 80);
        }

        //  d) GITHUB API LAYER
        //
        //  Three async functions, one per data type.
        //  Lookup order for each:
        //    1. memCache — zero cost, already in memory this session
        //    2. localStorage — survives refresh, checked against 1hr TTL
        //    3. GitHub REST API — only called when both layers miss
        //
        //  getLanguages() must fire one request per own repo to retrieve
        //  per-language byte counts. These are batched 5 at a time to
        //  stay well under the 60 req/hr unauthenticated rate limit.
        // ============================================================

        const GH_USER    = 'PenguineDavid';
        const GH_API     = 'https://api.github.com';
        const GH_HEADERS = { Accept: 'application/vnd.github.v3+json' };

        // In-memory layer — populated on first fetch, wiped only on hard refresh
        const memCache = {
            profile:   null,
            repos:     null,
            languages: null,
        };


        /**
         * Minimal fetch wrapper. Throws a descriptive Error on non-2xx.
         */
        async function ghGet(url) {
            const response = await fetch(url, { headers: GH_HEADERS });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        }


        /**
         * Executes an array of promise-factory functions in sequential batches
         * of `batchSize`, awaiting each batch before starting the next.
         * Returns a flat array of Promise.allSettled results so individual
         * request failures don't abort the entire run.
         */
        async function batchedAll(promiseFns, batchSize = 5) {
            const results = [];

            for (let i = 0; i < promiseFns.length; i += batchSize) {
                const batch        = promiseFns.slice(i, i + batchSize);
                const batchResults = await Promise.allSettled(batch.map(fn => fn()));
                results.push(...batchResults);
            }

            return results;
        }


        /**
         * Fetches the public profile for GH_USER.
         * Cached under LS_KEYS.profile.
         */
        async function getProfile() {
            if (memCache.profile) return memCache.profile;

            const cached = lsGet(LS_KEYS.profile);
            if (cached) {
                memCache.profile = cached;
                return cached;
            }

            const data       = await ghGet(`${GH_API}/users/${GH_USER}`);
            lsSet(LS_KEYS.profile, data);
            memCache.profile = data;
            return data;
        }


        /**
         * Fetches all public repos for GH_USER (pages 1 and 2, deduped by id).
         * Cached under LS_KEYS.repos.
         */
        async function getRepos() {
            if (memCache.repos) return memCache.repos;

            const cached = lsGet(LS_KEYS.repos);
            if (cached) {
                memCache.repos = cached;
                return cached;
            }

            // Both pages in parallel — covers up to 200 repos
            const [page1, page2] = await Promise.all([
                ghGet(`${GH_API}/users/${GH_USER}/repos?per_page=100&sort=pushed&page=1`),
                ghGet(`${GH_API}/users/${GH_USER}/repos?per_page=100&sort=pushed&page=2`),
            ]);

            const data = [...page1, ...page2].filter(
                (repo, index, all) => all.findIndex(r => r.id === repo.id) === index
            );

            lsSet(LS_KEYS.repos, data);
            memCache.repos = data;
            return data;
        }


        /**
         * Aggregates language byte counts across all own (non-fork) repos,
         * then converts to percentages. Matches GitHub's own methodology.
         * Cached under LS_KEYS.languages.
         */
        async function getLanguages() {
            if (memCache.languages) return memCache.languages;

            const cached = lsGet(LS_KEYS.languages);
            if (cached) {
                memCache.languages = cached;
                return cached;
            }

            const repos    = await getRepos();
            const ownRepos = repos.filter(repo => !repo.fork);

            // One request per repo, batched 5 at a time
            const results = await batchedAll(
                ownRepos.map(repo => () => ghGet(repo.languages_url)),
                5
            );

            // Sum raw bytes per language across all repos
            const totals = {};
            results.forEach(result => {
                if (result.status !== 'fulfilled') return;   // tolerate individual failures

                for (const [language, bytes] of Object.entries(result.value)) {
                    totals[language] = (totals[language] || 0) + bytes;
                }
            });

            // Convert to percentages, sort descending
            const totalBytes = Object.values(totals).reduce((a, b) => a + b, 0) || 1;
            const data       = Object.fromEntries(
                Object.entries(totals)
                    .map(([lang, bytes]) => [lang, (bytes / totalBytes) * 100])
                    .sort((a, b) => b[1] - a[1])
            );

            lsSet(LS_KEYS.languages, data);
            memCache.languages = data;
            return data;
        }

        //  Enter      — parse and dispatch command

        //  Any other  — nudge rain into a brief mini-burst

        //  Commands are split on whitespace so subcommands like
        //  `cache refresh` can be handled naturally.
        // ============================================================

        const commandHistory = [];
        let   historyIndex   = -1;


        cmdInput.addEventListener('keydown', async (event) => {

            if (event.key === 'Enter') {
                const rawInput = cmdInput.value.trim();
                cmdInput.value = '';
                if (!rawInput) return;

                // Split into command + optional subcommand/argument
                const tokens = rawInput.toLowerCase().split(/\s+/);
                const cmd    = tokens[0];
                const arg    = tokens[1] || undefined;

                // Echo the typed line to the output with prompt styling
                append(`${PROMPT_HTML}<span class="c-white">${rawInput}</span>`);

                // Push to history (most recent first)
                commandHistory.unshift(rawInput);
                historyIndex = -1;

                // Trigger animation burst and maybe a popup
                burstFrames = BURST_DURATION;
                idleFrames  = 0;
                if (Math.random() < 0.6) spawnPopup();

                // Dispatch to the matching command, or print an error
                if (COMMANDS[cmd]) {
                    await COMMANDS[cmd](arg);
                } else {
                    blank();
                    append(`  <span class="c-err">${rawInput}: command not found</span>`);
                    append(
                        `  <span class="c-dim">type </span>`    +
                        `<span class="c-acc">help</span>`       +
                        `<span class="c-dim"> for available commands</span>`
                    );
                    blank();
                }

            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (historyIndex < commandHistory.length - 1) historyIndex++;
                cmdInput.value = commandHistory[historyIndex] || '';

            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                historyIndex   = Math.max(-1, historyIndex - 1);
                cmdInput.value = historyIndex >= 0 ? commandHistory[historyIndex] : '';

            } else if (event.key === 'Tab') {
                event.preventDefault();
                // Only autocomplete the command token, not subcommands
                const partial = cmdInput.value.trim().toLowerCase().split(/\s+/)[0];
                const match   = Object.keys(COMMANDS).find(k => k.startsWith(partial));
                if (match) cmdInput.value = match;

            } else if (event.ctrlKey && event.key === 'l') {
                event.preventDefault();
                COMMANDS.clear();

            } else {
                // Any other keypress: briefly nudge the rain if not already bursting
                if (!isBurst()) {
                    idleFrames  = 0;
                    burstFrames = 8;

        //  schedules the next, producing a typewriter effect.
        //  Cache state is read before the array is built so the boot
        //  log can accurately report what's already available.
        // ============================================================

        // Check what's in the cache before printing anything
        const bootCacheNote = (() => {
            const profileAge   = lsAge(LS_KEYS.profile);
            const reposAge     = lsAge(LS_KEYS.repos);
            const languagesAge = lsAge(LS_KEYS.languages);

            if (profileAge || reposAge || languagesAge) {
                return (
                    `cached data found — ` +
                    `profile: ${profileAge || '—'}, ` +
                    `repos: ${reposAge || '—'}, ` +
                    `langs: ${languagesAge || '—'}`
                );
            }

            return 'no local cache — will fetch on first command';
        })();


        const BOOT_SEQUENCE = [
            [`<span class="c-dim">BIOS v2.4.1 — PenguineDavid Systems</span>`,                                                           60  ],
            [`<span class="c-dim">Loading kernel modules.............................. <span class="c-ok">OK</span></span>`,               100 ],
            [`<span class="c-dim">Mounting skill partitions........................... <span class="c-ok">OK</span></span>`,               110 ],
            [`<span class="c-dim">Calibrating creativity engine....................... <span class="c-ok">OK</span></span>`,               120 ],
            [`<span class="c-dim">Establishing GitHub uplink.......................... <span class="c-ok">OK</span></span>`,               130 ],
            [`<span class="c-dim">Initialising ConPTY layer........................... <span class="c-ok">OK</span></span>`,               130 ],
            [`<span class="c-dim">Checking localStorage cache......................... <span class="c-ok">OK</span></span>`,               130 ],
            [`<span class="c-dim">  ${bootCacheNote}</span>`,                                                                             160 ],
            [`<span class="c-dim">Suppressing imposter syndrome....................... <span class="c-acc">PARTIAL</span></span>`,         200 ],
            [`&nbsp;`,                                                                                                                     80  ],

            // Typewriter the ASCII PD one row at a time
            ...ASCII_PD.map(line => [`<span class="c-hi glow">${line}</span>`, 35]),

            [`<span class="c-hi glow">   PenguineDavid — Software Developer</span>`,                                                      80  ],
            [`&nbsp;`,                                                                                                                     50  ],
            [`  <span class="c-out">Creative Technologist · Sydney, AU · github.com/${GH_USER}</span>`,                                  60  ],
            [`  <span class="c-dim">Licensed under Polyform Non-Commercial License 1.0.0</span>`,                                         70  ],
            [`&nbsp;`,                                                                                                                     80  ],
            [`  <span class="c-dim">System ready. Type </span><span class="c-acc">help</span><span class="c-dim"> to begin.</span>`,      0   ],
            [`&nbsp;`,                                                                                                                     0   ],
        ];


        /**
         * Recursive boot printer.
         * Appends one BOOT_SEQUENCE entry then schedules the next via setTimeout.
         * Focuses the input field once all entries have been printed.
         */
        (function runBoot(index) {
            if (index >= BOOT_SEQUENCE.length) {
                cmdInput.focus();
                return;
            }

            const [html, delay] = BOOT_SEQUENCE[index];
            append(html);
            setTimeout(() => runBoot(index + 1), delay);
        })(0);

    </script>

</body>
